<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NyCypher — Application</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg"></div>
  <main class="wrap">
    <header class="hero">
      <nav class="topnav">
        <div class="brand">
          <span class="badge">NyCypher</span>
        </div>
        <div class="links">
          <a href="index.html" class="active">Application</a>
          <a href="apropos.html">À propos</a>
          <a href="notes.html">Notes</a>
        </div>
      </nav>
      <h1>Bienvenue sur NyCypher</h1>
      <p>Chiffre ou déchiffre un message avec différents algorithmes. AES via WebCrypto, et algos pédagogiques (César, Vigenère, S‑DES).</p>
    </header>

    <section class="panel">
      <div id="alert" class="alert" role="alert" aria-live="polite"></div>
      <div class="row">
        <label class="field">
          <span>Mode</span>
          <div class="segmented" role="group" aria-label="mode">
            <button class="seg is-active" data-mode="encrypt">Chiffrer</button>
            <button class="seg" data-mode="decrypt">Déchiffrer</button>
          </div>
        </label>

        <label class="field">
          <span>Algorithme</span>
          <select id="algo">
            <option value="aes">AES-256-GCM (recommandé)</option>
            <option value="cesar">César</option>
            <option value="vigenere">Vigenère</option>
            <option value="sdes">DES simplifié (S‑DES)</option>
          </select>
        </label>
      </div>

      <div class="row">
        <label class="field grow">
          <span>Clé / Mot de passe</span>
          <input id="key" type="text" placeholder="Ex: motdepasse ou clé" />
        </label>
        <label class="field small" id="shiftField">
          <span>Décalage (César)</span>
          <input id="shift" type="number" min="0" max="25" value="3" />
        </label>
        <label class="field small" id="sdesField">
          <span>Clé 10 bits (S‑DES)</span>
          <input id="sdesKey" type="text" placeholder="1010000010" />
        </label>
      </div>

      <div class="row">
        <label class="field grow">
          <span>Texte d'entrée</span>
          <textarea id="input" rows="6" placeholder="Saisis ton message..."></textarea>
        </label>
      </div>

      <div class="row actions">
        <button id="run" class="cta">Exécuter</button>
        <button id="swap" class="ghost">Inverser entrée/sortie</button>
        <button id="copy" class="ghost">Copier la sortie</button>
      </div>

      <div class="row">
        <label class="field grow">
          <span>Résultat</span>
          <textarea id="output" rows="6" readonly></textarea>
        </label>
      </div>

      <p class="hint" id="hint"></p>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
